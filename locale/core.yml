      javascript_disabled_message: Ovaj sajt je najbolji u modernom pregledniku s uključenim JavaScriptom.
      load_error_message: Nešto nije u redu pri učitavanju pune verzije ovog sajta. Pokušajte prinudno osvježiti ovu stranicu kako biste riješili grešku.
      loading_text: => core.ref.loading

    # Translations in this namespace are displayed in the basic HTML discussion view.
    discussion:
      next_page_button: => core.ref.next_page
      previous_page_button: => core.ref.previous_page

    # Translations in this namespace are displayed when Flarum encounters an error.
    error:
      csrf_token_mismatch: Bili ste neaktivni predugo.
      csrf_token_mismatch_return_link: Vratite se i pokušajte ponovo
      invalid_confirmation_token: Ovaj link za potvrdu je već iskorišten ili nije važeći.
      maintenance_mode_link: Prijava administratora
      maintenance_mode_message: Ovaj forum je trenutno u održavanju. Molimo provjerite ponovo kasnije.
      maintenance_mode_title: Održavanje
      method_not_allowed: Ova stranica ne podržava taj način zahtjeva.
      not_authenticated: Nemate dozvolu za pristup ovoj stranici. Pokušajte ponovo nakon prijave.
      not_found: Stranica koju ste tražili nije pronađena.
      not_found_return_link: "Povratak na {forum}"
      permission_denied: Nemate dozvolu za pristup ovoj stranici.
      unknown: Došlo je do greške pri učitavanju ove stranice.

    # Translations in this namespace are displayed by the basic HTML discussion index.
    index:
      all_discussions_heading: => core.ref.all_discussions
      next_page_button: => core.ref.next_page
      previous_page_button: => core.ref.previous_page

    # Translations in this namespace are displayed by the basic HTML forum layout.
    layout:
      skip_to_content: Preskoči na sadržaj

    # Translations in this namespace are displayed by the Log Out confirmation interface.
    log_out:
      log_out_button: => core.ref.log_out
      log_out_confirmation: "Jeste li sigurni da se želite odjaviti s foruma {forum}?"
      title: => core.ref.log_out

    # Translations in this namespace are displayed on the login interface.
    log_in:
      invalid_login_message: => core.ref.invalid_login_message
      username_or_email_placeholder: => core.ref.username_or_email_placeholder
      password_placeholder: => core.ref.password
      remember_me_label: => core.ref.remember_me_label
      submit_button: => core.ref.log_in
      title: => core.ref.log_in

    # Translations in this namespace are displayed by the Reset Password interface.
    reset_password:
      confirm_password_label: Potvrdite novu lozinku
      new_password_label: Nova lozinka
      submit_button: => core.ref.save_changes
      title: => core.ref.reset_your_password

    # Translations in this namespace are displayed by the email unsubscribe interface.
    unsubscribe_email:
      title: Potvrda odjave od pretplate
      return_to_forum: Natrag na {forumTitle}
      confirm_button: Potvrdi
      immediate_helptext: Odmah ćete biti odjavljeni od pretplate nakon potvrde.
      confirm_message: "Zatražili ste odjavu od pretplate na obavijesti e-poštom tipa \"{type}\" s foruma {forumTitle}."
      success_message: "Uspješno ste se odjavili od pretplate na obavijesti tipa \"{type}\" s foruma {forumTitle}. Ako ih želite ponovo primati, [ažurirajte vaše postavke]({settingsLink})."
      invalid_message: "Ovaj link za odjavu od pretplate nije važeći ili je već iskorišten. Za bilo kakve promjene u obavijestima e-poštom s foruma {forumTitle}, molimo [provjerite vaše postavke]({settingsLink})."

  # Translations in this namespace are used in messages output by the API.
  api:
    invalid_username_message: "Korisničko ime smije sadržavati samo slova, brojeve i crtice, s najmanje jednim slovom."
    invalid_filter_type:
      must_be_numeric_message: "Filter {filter} mora biti numerički."
      must_not_be_array_message: "Filter {filter} ne smije biti niz."
      must_not_be_multidimensional_array_message: "Filter {filter} ne smije biti višedimenzionalni niz."

  # Translations in this namespace are used in emails sent by the forum.
  email:
    greeting: "Selam, {displayName}"
    signoff: "Administracija foruma {forumTitle}"

    # These translations are used by the "informational" email template.
    informational:
      default_title: "Informacija"
      footer: "Ova e-pošta je poslana na {userEmail} kao informacijska usluga vezana za vaš račun na [{forumTitle}]({forumUrl})."
      footer_plain: "Ova e-pošta je poslana na {userEmail} kao informacijska usluga vezana za vaš račun na {forumTitle}."

    # These translations are used by the "notification" email template.
    notification:
        default_title: "Obavijest"
        footer:
          main_text: "Ova e-pošta je poslana na {email} jer ste pretplaćeni na obavijesti tipa \"{type}\" na [{forumTitle}]({forumUrl})."
          main_text_plain: "Ova e-pošta je poslana na {email} jer ste pretplaćeni na obavijesti tipa \"{type}\" na {forumTitle}."
          unsubscribe_text: "Ako ne želite više primati ovaj tip obavijesti, [odjavite se ovdje]({unsubscribeLink})."
          unsubscribe_text_plain: "Ako ne želite više primati ovaj tip obavijesti, odjavite se ovdje: {unsubscribeLink}"
          settings_text: "Upravljajte postavkama obavijesti [ovdje]({settingsLink})."
          settings_text_plain: "Upravljajte postavkama obavijesti ovdje: {settingsLink}"

    # These translations are used in emails sent when users register new accounts.
    activate_account:
      subject: Aktivirajte vaš novi račun
      body: |
        Neko (nadamo se vi!) se registrovao na {forum} s ovom e-mail adresom.

        Ako ste to vi, jednostavno kliknite na sljedeći link i vaš račun će biti aktiviran:
        {url}

        Ako se niste registrirali, molimo zanemarite ovu e-poštu.

    # These translations are used in emails sent when users change their email address.
    confirm_email:
      subject: Potvrdite vašu novu e-mail adresu
      body: |
        Neko (nadamo se vi!) je promijenio e-mail adresu na {forum} na ovu adresu.

        Ako ste to vi, jednostavno kliknite na sljedeći link i vaša e-mail adresa će biti potvrđena:
        {url}

        Ako to niste bili vi, molimo zanemarite ovu e-poštu.

    # These translations are used in emails sent when users ask to reset their passwords.
    reset_password:
      subject: => core.ref.reset_your_password
      body: |
        Neko (nadamo se vi!) je podnio zahtjev za zaboravljenu lozinku za vaš račun na {forum}.

        Ako ste to vi, kliknite na sljedeći link kako biste resetovali lozinku:
        {url}

        Ako ne želite promijeniti lozinku, samo zanemarite ovu e-poštu i ništa se neće desiti.

    # These translations are used when testing mailing configuration
    send_test:
      subject: Flarum testna e-pošta
      body: |
        Ovo je testna e-pošta za potvrdu da vaša Flarum konfiguracija e-pošte ispravno funkcioniše.

        Ako ste ovo vi, ova e-pošta znači da vaša konfiguracija radi!

        Ako to niste vi, molimo zanemarite ovu e-poštu.

