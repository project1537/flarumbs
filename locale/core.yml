      csrf_token_mismatch: Bili ste neaktivni predugo.
      csrf_token_mismatch_return_link: Vratite se i pokušajte ponovo
      invalid_confirmation_token: Ovaj link za potvrdu je već korišten ili nije važeći.
      maintenance_mode_link: Prijava administratora
      maintenance_mode_message: Forum je trenutno u načinu održavanja. Molimo pokušajte ponovo kasnije.
      maintenance_mode_title: Održavanje
      method_not_allowed: Ova stranica ne podržava tu metodu zahtjeva.
      not_authenticated: Nemate dozvolu za pristup ovoj stranici. Pokušajte ponovo nakon prijave.
      not_found: Stranica koju ste zatražili nije pronađena.
      not_found_return_link: "Povratak na {forum}"
      permission_denied: Nemate dozvolu za pristup ovoj stranici.
      unknown: Došlo je do greške pri učitavanju ove stranice.

    # Translations in this namespace are displayed by the basic HTML discussion index.
    index:
      all_discussions_heading: => core.ref.all_discussions
      next_page_button: => core.ref.next_page
      previous_page_button: => core.ref.previous_page

    # Translations in this namespace are displayed by the basic HTML forum layout.
    layout:
      skip_to_content: Preskoči na sadržaj

    # Translations in this namespace are displayed by the Log Out confirmation interface.
    log_out:
      log_out_button: => core.ref.log_out
      log_out_confirmation: "Jeste li sigurni da se želite odjaviti s {forum}?"
      title: => core.ref.log_out

    # Translations in this namespace are displayed on the login interface.
    log_in:
      invalid_login_message: => core.ref.invalid_login_message
      username_or_email_placeholder: => core.ref.username_or_email_placeholder
      password_placeholder: => core.ref.password
      remember_me_label: => core.ref.remember_me_label
      submit_button: => core.ref.log_in
      title: => core.ref.log_in

    # Translations in this namespace are displayed by the Reset Password interface.
    reset_password:
      confirm_password_label: Potvrdi novu lozinku
      new_password_label: Nova lozinka
      submit_button: => core.ref.save_changes
      title: => core.ref.reset_your_password

    # Translations in this namespace are displayed by the email unsubscribe interface.
    unsubscribe_email:
      title: Potvrda odjave od obavještenja
      return_to_forum: Povratak na {forumTitle}
      confirm_button: Potvrdi
      immediate_helptext: Bit ćete odmah odjavljeni od obavještenja kada potvrdite.
      confirm_message: "Zatražili ste odjavu od e-mail obavještenja tipa \"{type}\" s foruma {forumTitle}."
      success_message: "Uspješno ste se odjavili od obavještenja tipa \"{type}\" s foruma {forumTitle}. Ako ih opet želite primati, molimo [ažurirajte svoje postavke]({settingsLink})."
      invalid_message: "Ovaj link za odjavu je nevažeći ili je već korišten. Za sve promjene e-mail obavještenja s foruma {forumTitle}, molimo [provjerite svoje postavke]({settingsLink})."

  # Translations in this namespace are used in messages output by the API.
  api:
    invalid_username_message: "Korisničko ime smije sadržavati samo slova, brojeve i crtice. S najmanje jednim slovom."
    invalid_filter_type:
      must_be_numeric_message: "Filter {filter} mora biti numerički."
      must_not_be_array_message: "Filter {filter} ne smije biti niz."
      must_not_be_multidimensional_array_message: "Filter {filter} ne smije biti višedimenzionalni niz."

  # Translations in this namespace are used in emails sent by the forum.
  email:
    greeting: "Zdravo, {displayName},"
    signoff: "Tim foruma {forumTitle}"

    # These translations are used by the "informational" email template.
    informational:
      default_title: "Informacija"
      footer: "Ova e-poruka je poslana na {userEmail} kao informativna usluga vezana za vaš nalog na [{forumTitle}]({forumUrl})."
      footer_plain: "Ova e-poruka je poslana na {userEmail} kao informativna usluga vezana za vaš nalog na {forumTitle}."

    # These translations are used by the "notification" email template.
    notification:
        default_title: "Obavještenje"
        footer:
          main_text: "Ova e-poruka je poslana na {email} jer ste pretplaćeni na obavještenja tipa \"{type}\" na [{forumTitle}]({forumUrl})."
          main_text_plain: "Ova e-poruka je poslana na {email} jer ste pretplaćeni na obavještenja tipa \"{type}\" na {forumTitle}."
          unsubscribe_text: "Ako ne želite više primati ovaj tip obavještenja, [odjavite se ovdje]({unsubscribeLink})."
          unsubscribe_text_plain: "Ako ne želite više primati ovaj tip obavještenja, odjavite se ovdje: {unsubscribeLink}"
          settings_text: "Upravljajte postavkama obavještenja [ovdje]({settingsLink})."
          settings_text_plain: "Upravljajte postavkama obavještenja ovdje: {settingsLink}"

    # These translations are used in emails sent when users register new accounts.
    activate_account:
      subject: Aktivirajte vaš novi nalog
      body: |
        Neko (nadamo se vi!) se registrovao na {forum} s ovom e-mail adresom.

        Ako ste to bili vi, jednostavno kliknite na sljedeći link i vaš nalog će biti aktiviran:
        {url}

        Ako se niste registrovali, molimo zanemarite ovu e-poruku.

    # These translations are used in emails sent when users change their email address.
    confirm_email:
      subject: Potvrdite svoju novu e-mail adresu
      body: |
        Neko (nadamo se vi!) je promijenio e-mail adresu na {forum} na ovu.

        Ako ste to bili vi, jednostavno kliknite na sljedeći link i vaša e-mail adresa će biti potvrđena:
        {url}

        Ako to niste bili vi, molimo zanemarite ovu e-poruku.

    # These translations are used in emails sent when users ask to reset their passwords.
    reset_password:
      subject: => core.ref.reset_your_password
      body: |
        Neko (nadamo se vi!) je podnio zahtjev za zaboravljenu lozinku za vaš nalog na {forum}.

        Ako ste to bili vi, kliknite na sljedeći link da biste resetirali lozinku:
        {url}

        Ako ne želite promijeniti lozinku, jednostavno zanemarite ovu e-poruku i ništa se neće desiti.

    # These translations are used when testing mailing configuration
    send_test:
      subject: Flarum testna e-poruka
      body: |
        Ovo je testna e-poruka za potvrdu da vaša Flarum konfiguracija e-pošte radi ispravno.

        Ako ste je vi poslali, ova e-poruka znači da vaša konfiguracija funkcioniše!

        Ako to niste bili vi, molimo zanemarite ovu e-poruku.

