            link-group-mentions: Poveži spominjanja grupa u objavama s imenikom korisnika

    lib:
        sort:
            not_specified: Koristi Flarum zadano
            default: Zadano
            username_az: Korisničko ime (a-z)
            username_za: Korisničko ime (z-a)
            newest: Najnoviji
            oldest: Najstariji
            most_posts: Najviše objava
            least_posts: Najmanje objava
            most_discussions: Najviše diskusija
            least_discussions: Najmanje diskusija
