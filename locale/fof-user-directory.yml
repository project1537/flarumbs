fof-user-directory:
    forum:
        header:
            back_to_user_directory_tooltip: Povratak na imenik korisnika

        hero:
            title: => fof-user-directory.forum.page.nav

        search:
            users_heading: 'Pretraga svih korisnika za "{query}"'
            field:
                placeholder: Pretraži sve korisnike
            kinds:
