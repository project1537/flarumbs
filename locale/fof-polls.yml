      enable_global_polls_help: Globalne ankete nisu vezane za određenu objavu i dostupne su s posebne stranice anketa.
      enabled_poll_groups: Omogući grupe anketa
      enabled_poll_groups_help: Grupe anketa omogućavaju grupiranje globalnih anketa i njihov prikaz na posebnoj stranici.
