      enable_discussion_polls_help: Kada je omogućeno, korisnici mogu kreirati ankete unutar diskusijskih objava. Onemogućite ovo ako želite koristiti samo globalne ankete.
      global_polls:
        heading: Globalne ankete
        help: Ove postavke kontrolišu funkciju globalnih anketa.
      image:
        heading: Postavke slika
        help: Konfigurirajte ograničenja veličine i dimenzije pri uploadu slika. Slike se automatski konvertuju u WebP format i generišu se responzivne varijante.
