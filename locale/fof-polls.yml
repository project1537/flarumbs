      max_image_upload_size: Maksimalna veličina uploada slike (KB)
      max_image_upload_size_help: Maksimalna veličina fajla pri uploadu slika u kilobajtima. Slike se automatski konvertuju u WebP i mijenjaju veličinu nakon uploada, tako da će konačna pohranjena veličina biti znatno manja. Zadano je 10240 KB (10 MB).
      image_height: Visina slike pri promjeni veličine (px)
      image_width: Širina slike pri promjeni veličine (px)
      image_dimensions_help: Osnovne dimenzije za pohranjene slike. HiDPI varijante (@2x, @3x) se generišu automatski kada je izvorna slika dovoljno velika.
