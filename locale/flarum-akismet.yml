flarum-akismet:

  ##
  # UNIQUE KEYS - The following keys are used in only one location each.
  ##

  # Translations in this namespace are used by the admin interface.
  admin:

    # These translations are used in the Akismet Settings.
    akismet_settings:
      api_key_label: API ključ
      title: Akismet postavke
      delete_blatant_spam_label: Automatski obriši očigledni spam
      delete_blatant_spam_help: Ako Akismet utvrdi da je komentar očigledni spam, objava će biti automatski obrisana umjesto što se prijavljuje moderatorima
    permissions:
      bypass_akismet: Zaobiđi Akismet

  # Translations in this namespace are used by the forum user interface.
  forum:

    # These translations are used by the frame displayed around flagged posts.
    post:
      akismet_flagged_text: Akismet označio kao spam
      not_spam_button: Nije spam
