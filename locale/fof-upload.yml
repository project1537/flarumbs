        php_ini_values: "Vaše vrijednosti <code>php.ini</code> su <code>post_max_size={post}</code> i <code>upload_max_filesize={upload}</code>. Osigurajte da je ovdje postavljena vrijednost ispod ovih pragova ili ih prilagodite. Ako koristite <code>Nginx</code>, osigurajte i da je <code>client_max_body_size</code> dovoljne veličine za odabrano ograničenje."
