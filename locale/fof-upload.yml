      watermark:
        file: Otpremite sliku vodenog žiga
        opacity: "Neprozirnost vodenog žiga (0–100)"
        padding: "Razmak od ruba (px)"
        position: Pozicija vodenog žiga
        size_percent: "Veličina vodenog žiga (% širine slike)"
        title: Vodeni žig na slikama
        toggle: Dodaj vodeni žig na slike
      svg-sanitizer:
        title: SVG sanitajzer
        allow_animate: Dozvoli SVG animacije
        help: Konfigurirajte kako se SVG datoteke obrađuju i sanitiziraju pri otpremanju. SVG datoteke mogu sadržavati potencijalno štetne skripte i treba ih pažljivo rukovati. Otpremljeni SVG-ovi se sanitiziraju pri otpremanju i štetne skripte i oznake se uklanjaju.
        allow_animate_help: Omogućavanje SVG animacija može uvesti sigurnosne ranjivosti jer animirani SVG-ovi mogu sadržavati zlonamjerni kôd. Omogućite ovu postavku na vlastitu odgovornost i samo ako imate povjerenja u vaše korisnike.
      composer_buttons:
        title: Dugmad u editoru
        options:
          both: Oba
          upload-btn: Samo dugme za otpremu
          media-btn: Samo dugme za upravitelja medija
      inspect-mime: Ispitaj MIME tip datoteke

    warnings:
      fileinfo_missing: |
        PHP ekstenzija <strong>fileinfo</strong> nije učitana na ovom serveru. FoF Upload će i dalje raditi, ali unakrsna provjera MIME tipova je onemogućena, što smanjuje zaštitu od lažiranih vrsta datoteka. Omogućite ekstenziju u vašoj PHP konfiguraciji za najveću sigurnost.
    permissions:
      download_label: Preuzimanje datoteka
      upload_label: Otpremanje datoteka (osnovna dozvola, obavezna za sve otpreme)
      upload_mime_label: "Otpremanje {label}"
      view_user_uploads_label: Pregled korisničkih otprema
      delete_uploads_of_others_label: Brisanje korisničkih otprema
      upload_shared_label: Otpremanje dijeljenih datoteka
      access_shared_label: Pristup dijeljenim datotekama u upravitelju medija
    templates:
      file: Zadani predložak preuzimanja datoteke
      file_description: |
        Prikazuje naziv datoteke i opće informacije. Preuzimanja proksira kroz PHP, omogućavajući prikupljanje statistika i zaštitu od hotlinkinga.
      image: Zadani predložak preuzimanja slike
      image_description: |
        Prikazuje sličicu slike i proksira preuzimanje kroz PHP. Omogućava prikupljanje statistika i zaštitu od hotlinkinga.
      image-preview: Predložak potpunog pregleda slike
      image-preview_description: |
        Prikazuje potpunu sliku umetnuto. Nema funkcionalnosti preuzimanja, statistike se ne prikupljaju i zaštita od hotlinkinga se ignorira.
      markdown-image: Markdown predložak slike
      markdown-image_description: |
        Prikazuje potpunu sliku umetnuto koristeći Markdown. <strong>Morate imati instaliran i omogućen flarum/markdown da bi ovo radilo.</strong> Nema funkcionalnosti preuzimanja, statistike se ne prikupljaju i zaštita od hotlinkinga se ignorira.
      bbcode-image: BBCode predložak slike
      bbcode-image_description: |
        Prikazuje potpunu sliku umetnuto koristeći BBCode. <strong>Morate imati instaliran i omogućen flarum/bbcode da bi ovo radilo.</strong> Nema funkcionalnosti preuzimanja, statistike se ne prikupljaju i zaštita od hotlinkinga se ignorira.
      just-url: Samo URL
      just-url_description: |
        Umeće samo URL. Prikazivanje može preuzeti druge ekstenzije s automatskim linkanjem. Nema funkcionalnosti preuzimanja, statistike se ne prikupljaju i zaštita od hotlinkinga se ignorira.
      text-preview: Tekstualni pregled
      text-preview_description: |
        Umeće pregled (prvih 5 redova) tekstualne datoteke, s opcijom proširivanja za prikaz cijelog sadržaja datoteke.
    upload_methods:
      aws-s3: S3 ili kompatibilno
      imgur: Imgur
      local: Lokalno
      ovh-svfs: OVH SVFS
      qiniu: QiNiu
    inspect-mime:
      title: Ispitivanje MIME tipa
      description: |
        FoF Upload koristi biblioteku <a>PHP Mime Detector</a> za uobičajene MIME tipove i PHP Fileinfo kao rezervu.
        MIME vrijednost koju vraća Fileinfo može se razlikovati od servera do servera!
