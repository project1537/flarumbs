flarum-gdpr:
  lib:
    data:
      uploads:
        export_description: Sve datoteke koje je korisnik otpremio.
        anonymize_description: Uklanja referencu na korisnika iz otpremljenih datoteka. Same datoteke ostaju dostupne korisnicima koji su ih mogli vidjeti prije anonimizacije.
        delete_description: Briše sve datoteke koje je korisnik otpremio.

fof-upload:
  admin:
    nav:
      shared-uploads-button: Dijeljene datoteke
    shared-uploads:
      description: Otpremite datoteke koje mogu koristiti svi korisnici vašeg foruma.
      introduction: |
        Dijeljene datoteke su datoteke koje mogu koristiti svi korisnici vašeg foruma. Nisu priložene nijednoj objavi, ali se mogu umetnuti u objave putem upravitelja medija.

        <strong>Upozorenje:</strong> Dijeljene datoteke nisu zaštićene nikakvim dozvolama. Svako s URL-om ih može pregledati.
      no-files: Još nisu otpremljene dijeljene datoteke.
      title: Dijeljene datoteke
      upload-new-button: Otpremi novu datoteku
    pane:
      title: Otprema
      description: Postavite usluge i postavke otpremanja.
    help_texts:
      disable-download-logging: |
        Onemogući bilježenje svakog preuzimanja koje naprave korisnici vašeg foruma. Ako ostane omogućeno, moći ćete vidjeti broj preuzimanja i ostale metrike u bliskoj budućnosti.
      disable-hotlink-protection: |
        Zaštita od hotlinkinga sprječava otvaranje preuzimanja s drugih sajtova. Trenutna metoda zahtijeva csrf token i ID objave.
      download_templates: |
        Predlošci preuzimanja određuju kako se otpremljene datoteke prikazuju na vašem forumu, npr. kao pregledi, dugmad. Trenutno dostupni:
      mime_types: |
        Ovdje konfigurirajte vaše mapiranje. Svaki regularni izraz MIME tipa bit će obrađen određenim adapterom za otpremu i predloškom preuzimanja.
        Opciono, dodijelite svakom unosu oznaku dozvole (npr. "Slike", "Videi") da biste kreirali posebnu dozvolu u rešetki dozvola.
        Ovo vam omogućava ograničavanje koje grupe mogu otpremati određene vrste datoteka — pored osnovne dozvole "Otpremanje datoteka" koja je uvijek obavezna.
      resize: |
        Odaberite da li želite promijeniti veličinu slika prije otpremanja. Možete odabrati maksimalnu širinu i visinu u pikselima. Proces promjene veličine zadržava omjer stranica slika.
      client_extension: |
        Zadano, Upload bira sigurnu ekstenziju datoteke na osnovu MIME tipa.
        Za neke vrste datoteka zasnovane na ZIP-u ili binarnim podacima, ovo može rezultirati korištenjem generičkih ekstenzija umjesto očekivanih.
        Ovdje možete unijeti listu ekstenzija datoteka odvojenih zarezom koje će se zadržati doslovno.
      thumbnails: |
        Generirajte smanjenu sličicu za slike pri otpremanju. Sličica se prikazuje umetnuto;
        klikom na nju otvara se originalna datoteka pune rezolucije u novoj kartici. Sličice značajno
        smanjuju potrošnju propusnog opsega i težinu stranice za forume s mnogo velikih slika.
      watermark: |
        Odaberite da li će slike dobiti vodeni žig pri otpremanju. Vodeni žigovi se dodaju na ne-gif slike prema vašim donjim postavkama.
      s3_compatible_storage: |
        Sljedeće postavke su potrebne samo pri korištenju S3 kompatibilnog pohrane. Ako koristite AWS, možete ih ostaviti praznim.
      s3_acl: |
        ACL koji treba primijeniti na otpremljeni objekt (zadano: private). Za moguće vrijednosti, pogledajte https://docs.aws.amazon.com/AmazonS3/latest/dev/acl-overview.html#canned-acl
      custom_s3_url: |
        Koristite ovu postavku ako koristite S3-kompatibilnu uslugu koja zahtijeva određeni format URL-a (npr. Backblaze B2) ili ako imate problema sa zadanim formatom URL-a. Ova postavka generalno nije neophodna za većinu usluga. Osigurajte da URL uključuje protokol (https://) i da je ispravno formatiran. Primjer: https://your-bucket.s3.your-region.backblazeb2.com
      s3_instance_profile: |
        Ostavite ključ i tajni ključ praznim da biste koristili akreditive iz profila instance.
      composer_buttons: |
        Zadano, vidljiva su oba dugmeta — za upravitelja medija i za otpremu. Možete odabrati i prikazivanje samo jednog dugmeta.
