  admin:
    settings:
      widget_layout: Raspored widgeta
      widget_layout_help: "Klasično: kompaktan widget u bočnoj traci. Puna širina: jednoredan bar iznad liste diskusija."
      widget_layout_classic: Bočna traka (klasično)
      widget_layout_full_width: Puna širina (iznad diskusija)
      bar_position_desktop: Pozicija bara (desktop)
      bar_position_desktop_help: "Gdje postaviti statistički bar na desktopu u odnosu na alatnu traku. Primjenjuje se samo na raspored pune širine."
      bar_position_mobile: Pozicija bara (mobilni)
      bar_position_mobile_help: "Gdje postaviti statistički bar na mobilnim uređajima u odnosu na alatnu traku."
      bar_position_above: Iznad alatne trake
      bar_position_inside: Unutar alatne trake
      bar_position_below: Ispod alatne trake
      widget_position: Pozicija widgeta u bočnoj traci (prioritet)
      widget_position_help: "Kontroliše gdje se widget prikazuje u bočnoj traci. Niže (negativnije) vrijednosti pomjeraju ga prema dnu. Zadano: -10. Primjenjuje se samo na raspored s bočnom trakom."

      section_online_users: Korisnici na mreži
      section_online_users_help: Konfigurišite prikaz korisnika na mreži u proširenom panelu widgeta.
      show_online_users: Prikaži korisnike na mreži
      show_online_users_help: Omogućite ili onemogućite funkciju korisnika na mreži u cijelosti. Kada je onemogućeno, neće se izvršavati upiti za korisnike na mreži.
      max_online_users: Maksimalan broj korisnika na mreži za prikaz
      max_online_users_help: "Maksimalan broj avatara prikazanih za obične korisnike. Korisnici iznad ovog broja prikazuju se kao indikator '+N više'. Veće vrijednosti povećavaju veličinu predmemorije i API opterećenje. Preporučeno: 10-20."
      max_online_users_privileged: Maksimalan broj korisnika na mreži za prikaz (privilegovani)
      max_online_users_privileged_help: "Maksimalan broj avatara prikazanih za privilegovane korisnike (one s dozvolom 'Uvijek prikaži kada je korisnik posljednji put viđen' — tipično administratori i moderatori). Budući da ova predmemorija služi manjem broju korisnika, može sigurno sadržavati više unosa. Preporučeno: 30-50."
      last_seen_interval: Interval posljednjeg pojavljivanja (minute)
      last_seen_interval_help: Koliko minuta od posljednje aktivnosti da se korisnik smatra aktivnim na mreži.
      online_users_cache_ttl: Trajanje predmemorije korisnika na mreži (sekunde)
      online_users_cache_ttl_help: "Koliko dugo predmemorirati listu korisnika na mreži. Održavaju se dvije odvojene predmemorije: jedna za privilegovane korisnike (one s dozvolom 'Uvijek prikaži kada je korisnik posljednji put viđen', koji mogu vidjeti i skrivene korisnike) i jedna za obične korisnike. Svaka predmemorija poštuje vlastito ograničenje maksimalnog prikaza."

      section_statistics: Statistike foruma
      section_statistics_help: Konfigurišite predmemoriranje za broj diskusija, objava, ukupan broj korisnika i statistike posljednje registracije.
      show_discussions_count: Prikaži broj diskusija
      show_posts_count: Prikaži broj objava
      show_users_count: Prikaži broj korisnika
      show_latest_registration: Prikaži posljednju registraciju
      stats_cache_duration: Trajanje predmemorije statistika (sekunde)
      stats_cache_duration_help: "Koliko dugo predmemorirati broj diskusija, objava, ukupan broj korisnika i posljednju registraciju. Predmemorija se automatski poništava kada se diskusije, objave ili korisnici kreiraju ili brišu. Postavite na 0 da onemogućite predmemoriranje (nije preporučeno za velike forume)."
      ignore_private_discussions: Ignoriši privatne diskusije u broju
    permissions:
      view_online_users: Pregledaj korisnike na mreži
      view_discussions_count: Pregledaj broj diskusija
      view_posts_count: Pregledaj broj objava
      view_users_count: Pregledaj broj korisnika
      view_latest_registration: Pregledaj posljednju registraciju
