flarum-suspend:

  ##
  # UNIQUE KEYS - The following keys are used in only one location each.
  ##

  # Translations in this namespace are used by the admin interface.
  admin:

    # These translations are used in the Permissions page of the admin interface.
    permissions:
      suspend_users_label: Suspendiraj korisnike

  # Translations in this namespace are used by the forum user interface.
  forum:
    # These translations are used in the suspension notifications
    notifications:
      user_suspended_text: "Vaš račun je suspendovan na {timeReadable}"
      user_suspended_indefinite_text: Vaš račun je suspendovan na neodređeno vrijeme
      user_unsuspended_text: Suspenzija vašeg računa je ukinuta

    # These translations are used for the suspension reason informational modal to the suspended user.
    suspension_info:
      dismiss_button: Zatvori
      indefinite: Ovo je suspenzija na neodređeno vrijeme
      limited: "Ova suspenzija ostaje na snazi do {date}"
      title: Ovaj račun je suspendovan

    # These translations are used in the Suspend User modal dialog (admin function).
    suspend_user:
      display_message: Prikaži poruku korisniku
      indefinitely_label: Suspendovan na neodređeno vrijeme
      limited_time_days_text: " dana"
      limited_time_label: Suspendovan na ograničeno vrijeme...
      not_suspended_label: Nije suspendovan
      placeholder_optional: Neobavezno
      reason: Razlog suspenzije
      status_heading: Status suspenzije
      submit_button: => core.ref.save_changes
      title: "Suspendiraj {username}"

    # These translations are displayed as tooltips for user badges.
    user_badge:
      suspended_tooltip: Suspendovan

    # These translations are found on the user profile page (admin function).
    user_controls:
      suspend_button: Suspendiraj

  # Translations in this namespace are used by suspension email notifications
  email:
    no_reason_given: Nije naveden razlog za ovu suspenziju.
    suspended:
      subject: Vaš račun je suspendovan
      plain:
        body: |
          Vaš račun je suspendovan iz sljedećeg razloga:

          ---
          {suspension_message}
          ---
      html:
        body: "Vaš račun na forumu {forumTitle} je suspendovan iz sljedećeg razloga:"

    unsuspended:
      subject: Suspenzija vašeg računa je ukinuta
      plain:
        body: |
          Suspenzija vašeg računa je ukinuta. Možete se vratiti na forum klikom na sljedeći link:

          {forum_url}
      html:
        body: "Suspenzija vašeg računa je ukinuta. Možete se vratiti na [{forumTitle}]({forum_url}) kada budete spremni."

  # Translations in this namespace are used by the forum and admin interfaces.
  lib:

    # These translations are used by gambits. Gambit keys must be in snake_case, no spaces.
    gambits:
      users:
        suspended:
          key: suspended
